[main]
font                      = Iosevka:weight=extralight:size=25
font-bold                 = Iosevka:weight=light:size=25
line-height               = 30

[colors-dark]
background                = 161616
foreground                = f6f6f6
alpha                     = 1.0

[key-bindings]
scrollback-up-line        = Control+Shift+k
scrollback-down-line      = Control+Shift+j
scrollback-up-half-page   = Control+Alt+k
scrollback-down-half-page = Control+Alt+j
show-urls-copy            = Alt+l

[bell]
system                    = no
