
################
### MONITORS ###
################

monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

$terminal             = kitty
$fileManager          = thunar
$toggleSystemInfoCmd  = eww active-windows | grep systeminfo && eww close systeminfo || eww open systeminfo
$toggleBar            = eww active-windows | grep bar && eww close bar || eww open bar
$launcher             = tofi-drun --drun-launch true
$toggleMpdPlay        = pidof mpd && mpc toggle || playerctl play-pause
$toggleAudioCtl       = pidof pavucontrol && kill -2 $(pidof pavucontrol) || pavucontrol


#################
### AUTOSTART ###
#################

# exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /home/rituraj/.cargo/bin/eww open bar 
exec-once = /home/rituraj/.config/hypr/hyprtracker.sh


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GRIM_DEFAULT_DIR,/home/rituraj/Pictures/screenshots

#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 1
    gaps_out = 0

    border_size = 1
    resize_on_border = true
    col.active_border = rgb(888888) 
    col.inactive_border = rgb(444444)

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    drop_shadow = false

    blur {
        enabled = false 
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = false 
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = true
    force_split = 1
}

master {
    new_status = "master"
}

misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gestures {
    workspace_swipe = false
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER 

bind = $mainMod, Space, exec, $launcher
bind = $mainMod, R, exec, $launcher
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen,
bind = $mainMod, Q, killactive,

bind = $mainMod Ctrl, Q, exec, hyprlock 

# Widget toggles
bind = $mainMod, F12, exec, $toggleSystemInfoCmd
bind = $mainMod, F1, exec, $toggleBar
bind = $mainMod, F2, exec, $toggleAudioCtl

# Move focus with mainMod + vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows with mainmod Alt + vim keys
bind = $mainMod Alt, h, movewindow, l
bind = $mainMod Alt, l, movewindow, r
bind = $mainMod Alt, k, movewindow, u
bind = $mainMod Alt, j, movewindow, d

# Resize windows with mainMod Shift + vim keys
bind = $mainMod Shift, h, resizeactive, -40 0
bind = $mainMod Shift, l, resizeactive, 40 0
bind = $mainMod Shift, k, resizeactive, 0 -40
bind = $mainMod Shift, j, resizeactive, 0 40

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + Tab
# holding Shift reverses the cycle order
bind = $mainMod, tab, workspace, e+1
bind = $mainMod Shift, tab, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# Audio Controls
bind=,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=$mainMod,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=,XF86AudioMute, exec, $toggleMpdPlay

# Mic Controls
bind=Alt,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
bind=Alt,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-

# Screenshot controls
bind=$mainMod, P, exec, grim
bind=$mainMod Ctrl, P, exec, slurp | grim -g -

